<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitor Calasans | Portfólio Profissional</title>
    <style>
        /* Variáveis de Identidade Visual e Design System */
        :root {
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --accent-blue: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            line-height: 1.6;
            scroll-behavior: smooth;
        }

        a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        a:hover {
            color: var(--accent-hover);
        }

        /* Menu de Navegação Superior (Glassmorphism) */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px 10%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .logo span {
            color: var(--accent-blue);
        }

        nav {
            display: flex;
            gap: 25px;
        }

        nav a {
            color: var(--text-muted);
            font-weight: 500;
            font-size: 15px;
            position: relative;
            padding: 5px 0;
        }

        nav a:hover {
            color: var(--text-main);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background-color: var(--accent-blue);
            transition: width 0.3s ease;
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Estrutura Geral das Secções */
        section {
            padding: 140px 10% 80px 10%;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .section-title {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: -0.5px;
        }

        .section-title span {
            color: var(--accent-blue);
        }

        /* Secção Hero (Apresentação Inicial) */
        #home {
            align-items: flex-start;
        }

        .badge-status {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 25px;
            border: 1px solid rgba(56, 189, 248, 0.2);
        }

        #home h1 {
            font-size: 54px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            letter-spacing: -1px;
        }

        #home h1 span {
            color: var(--accent-blue);
        }

        #home .objective-text {
            font-size: 20px;
            color: var(--text-muted);
            max-width: 800px;
            margin-bottom: 40px;
            text-align: left;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--accent-blue);
            color: var(--bg-dark);
            font-weight: 600;
            border-radius: 8px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 14px rgba(56, 189, 248, 0.3);
        }

        .btn:hover {
            background: var(--accent-hover);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.4);
            color: var(--bg-dark);
        }

        .btn.btn-outline {
            background: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }

        .btn.btn-outline:hover {
            background: rgba(255, 255, 255, 0.05);
            border-color: var(--text-main);
        }

        /* Secção Sobre Mim e Trajetória */
        .about-grid {
            display: grid;
            grid-template-columns: 1.6fr 1.4fr;
            gap: 50px;
            align-items: start;
        }

        .about-text p {
            color: var(--text-muted);
            font-size: 16.5px;
            margin-bottom: 20px;
            text-align: justify;
        }

        .about-text strong {
            color: var(--text-main);
        }

        .side-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .info-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 25px;
        }

        .info-card h3 {
            font-size: 18px;
            color: var(--accent-blue);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .info-card p {
            font-size: 14px;
            color: var(--text-muted);
            text-align: justify;
        }

        /* Secção Habilidades Completa (Hard & Soft) */
        .skills-wrapper {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .skills-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 30px;
            transition: all 0.3s ease;
        }

        .skills-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-3px);
        }

            font-size: 19px
