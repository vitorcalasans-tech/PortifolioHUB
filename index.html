<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitor Calasans | PortfolioHUB</title>

        /* Estilização Base */
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
        }
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            scroll-behavior: smooth; 
            line-height: 1.6;
        }
        a { 
            color: #38bdf8; 
            text-decoration: none; 
            transition: 0.3s;
        }
        a:hover {
            color: #0284c7;
        }
        
        /* Menu de Navegação */
        header { 
            position: fixed; 
            top: 0; 
            width: 100%; 
            background: rgba(15, 23, 42, 0.95); 
            padding: 20px 10%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 1000; 
            border-bottom: 1px solid #1e293b; 
            backdrop-filter: blur(5px);
        }
        .logo { 
            font-size: 24px; 
            font-weight: bold; 
            color: #38bdf8; 
        }
        nav a { 
            margin-left: 20px; 
            font-weight: 500; 
        }

        /* Estrutura Geral de Seções */
        section { 
            padding: 120px 10% 60px 10%; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
        }
        h2 {
            font-size: 32px;
            margin-bottom: 20px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
        }
        h2 span {
            color: #38bdf8;
        }
        
        /* Home / Hero Section */
        #home h1 { 
            font-size: 48px; 
            margin-bottom: 15px; 
            line-height: 1.2;
        }
        #home h1 span { 
            color: #38bdf8; 
        }
        #home .subtitle { 
            font-size: 20px; 
            color: #38bdf8; 
            margin-bottom: 15px; 
            font-weight: 600;
        }
        #home .objective {
            font-size: 16.5px;
            color: #94a3b8;
            max-width: 800px;
            margin-bottom: 35px;
            text-align: justify;
        }
        .btn-group {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

            padding: 12px 24px; 
            background: #38bdf8; 
            color: #0f172a; 
            font-weight: bold; 
            border-radius: 6px; 
            transition: 0.3s; 
        }
